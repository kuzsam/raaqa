# RAAQA — Read Alignment-based Assembly Quality Assessment

name: raaqa
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  - python>=3.10

  # --- Mapq_softclip module dependency ---
  - pysam>=0.22.0

  # --- Visualise module dependencies ---
  - matplotlib-base>=3.8
  - pandas>=2.0
  - numpy>=1.26

  # --- Testing ---
  - pytest>=7.0

  # --- Preprocessing tools (not required for raaqa itself) ---
  # Uncomment to install tools needed for generating raaqa inputs:
  # - samtools>=1.17
  # - minimap2>=2.26
  # - mashmap>=3.0